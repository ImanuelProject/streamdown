version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: streamdown_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    container_name: streamdown_worker
    restart: always
    command: python -m app.worker.main
    volumes:
      - ./backend:/app
      - ./data:/data  # For temporary files
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
    container_name: streamdown_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Assuming development mode map for now
    command: npm run dev -- --host

  redis:
    image: redis:7-alpine
    container_name: streamdown_redis
    restart: always
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: streamdown_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
